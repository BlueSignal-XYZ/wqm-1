name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          pip install pytest pytest-mock pytest-cov responses freezegun flask
          pip install smbus2 pyserial requests pycryptodome pyyaml

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install mypy and stubs
        run: |
          pip install mypy types-requests types-pyserial
          pip install smbus2 pyserial requests pycryptodome pyyaml

      - name: Run mypy
        run: mypy src/ --ignore-missing-imports --no-error-summary || true
