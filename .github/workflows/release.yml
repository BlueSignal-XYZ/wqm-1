name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package hardware BOM
        run: zip -r hardware-bom.zip hardware/bom/

      - name: Package hardware fab outputs
        run: |
          if [ -d hardware/fab ] && [ "$(ls -A hardware/fab 2>/dev/null)" ]; then
            zip -r hardware-fab.zip hardware/fab/
          else
            echo "No fab outputs found — skipping."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            hardware-bom.zip
            hardware-fab.zip
